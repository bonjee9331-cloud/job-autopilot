[build]
command = "npm run build"
functions = "netlify/functions"
publish = ".next"
node_bundler = "esbuild"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

[functions."job-sync"]
schedule = "0 6 * * *"

[functions."follow-up-run"]
schedule = "0 7 * * *"

[[headers]]
for = "/api/*"
[headers.values]
"Content-Type" = "application/json"

[[headers]]
for = "/*"
[headers.values]
"X-Content-Type-Options" = "nosniff"
"X-Frame-Options" = "DENY"
